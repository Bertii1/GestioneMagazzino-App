services:

  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: magazzino_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: gestione_magazzino
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/admin -u ${MONGO_USER:-admin} -p ${MONGO_PASSWORD:-changeme} --quiet
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Server API ─────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: magazzino_server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme}@mongo:27017/gestione_magazzino?authSource=admin
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:3000/health || exit 1
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Mobile Dev Server (Expo Metro Bundler) ─────────────────────────────────
  # Usato solo in sviluppo: npx expo start serve il bundle JS al dispositivo
  # Il dispositivo deve essere sulla stessa rete LAN del server Docker
  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: magazzino_mobile
    restart: unless-stopped
    environment:
      # IP dell'host Docker — il dispositivo si connette a questo IP
      REACT_NATIVE_PACKAGER_HOSTNAME: ${HOST_IP:-host-gateway}
      EXPO_DEVTOOLS_LISTEN_ADDRESS: "0.0.0.0"
    ports:
      - "8081:8081"   # Metro Bundler
      - "19000:19000" # Expo Go
      - "19001:19001" # Expo Go (legacy)
      - "19002:19002" # Expo DevTools
    volumes:
      # Hot-reload: monta il codice sorgente (escludi node_modules)
      - ./mobile/src:/app/src
      - ./mobile/App.tsx:/app/App.tsx
      - ./mobile/app.json:/app/app.json
    depends_on:
      server:
        condition: service_healthy
    profiles:
      - dev   # avviato solo con: docker compose --profile dev up

volumes:
  mongo_data:
    name: magazzino_mongo_data
