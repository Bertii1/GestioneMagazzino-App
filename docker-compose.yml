services:

  # ─── Caddy Reverse Proxy (HTTPS automatico) ─────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: magazzino_caddy
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      MONITORING_USER: ${MONITORING_USER:-admin}
      MONITORING_HASH: ${MONITORING_HASH:?Imposta MONITORING_HASH nel file .env (usa: docker run caddy caddy hash-password --plaintext PASSWORD)}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      server:
        condition: service_healthy

  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: magazzino_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?Imposta MONGO_PASSWORD nel file .env}
      MONGO_INITDB_DATABASE: gestione_magazzino
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    # Nessuna porta esposta — accessibile solo dalla rete Docker interna
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Server API ─────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: magazzino_server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD}@mongo:27017/gestione_magazzino?authSource=admin
    volumes:
      - uploads_data:/app/uploads
    # Nessuna porta esposta — raggiungibile solo via Caddy
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:3000/health || exit 1
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Monitoring: Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: magazzino_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.external-url=https://${DOMAIN}/prometheus'
      - '--web.route-prefix=/prometheus'
    depends_on:
      server:
        condition: service_healthy
    profiles:
      - monitoring

  # ─── Monitoring: Loki (log aggregation) ────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    container_name: magazzino_loki
    restart: unless-stopped
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    profiles:
      - monitoring

  # ─── Monitoring: Promtail (log shipper) ────────────────────────────────────
  promtail:
    image: grafana/promtail:3.1.0
    container_name: magazzino_promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    profiles:
      - monitoring

  # ─── Monitoring: Grafana (dashboard) ────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: magazzino_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Imposta GRAFANA_PASSWORD nel file .env}
      GF_SERVER_ROOT_URL: https://${DOMAIN}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    profiles:
      - monitoring

  # ─── Whisper ASR (open-weight, locale) ─────────────────────────────────────
  whisper-asr:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: magazzino_whisper
    restart: unless-stopped
    environment:
      ASR_MODEL: tiny
      ASR_ENGINE: openai_whisper
    volumes:
      - whisper_cache:/root/.cache/whisper
    # Nessuna porta esposta — raggiungibile solo dal server via rete Docker
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: wget -qO- http://localhost:9000/ || exit 1
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    profiles:
      - whisper

  # ─── Mobile Dev Server (Expo Metro Bundler) ─────────────────────────────────
  # Solo in sviluppo: docker compose --profile dev up
  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: magazzino_mobile
    restart: unless-stopped
    environment:
      REACT_NATIVE_PACKAGER_HOSTNAME: ${HOST_IP:-host-gateway}
      EXPO_DEVTOOLS_LISTEN_ADDRESS: "0.0.0.0"
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - ./mobile/src:/app/src
      - ./mobile/App.tsx:/app/App.tsx
      - ./mobile/app.json:/app/app.json
    depends_on:
      server:
        condition: service_healthy
    profiles:
      - dev

volumes:
  mongo_data:
    name: magazzino_mongo_data
  uploads_data:
    name: magazzino_uploads_data
  whisper_cache:
    name: magazzino_whisper_cache
  caddy_data:
    name: magazzino_caddy_data
  caddy_config:
    name: magazzino_caddy_config
  prometheus_data:
    name: magazzino_prometheus_data
  loki_data:
    name: magazzino_loki_data
  grafana_data:
    name: magazzino_grafana_data
