name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'docker-compose.yml'
      - 'Caddyfile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-south-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send SSM deploy command
        id: ssm
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "GitHub Actions deploy ${{ github.sha }}" \
            --timeout-seconds 600 \
            --cloud-watch-output-config '{"CloudWatchOutputEnabled":true}' \
            --parameters '{"commands":["set -euo pipefail","cd /opt/magazzino","sudo -u ec2-user git fetch --all --prune","sudo -u ec2-user git reset --hard origin/main","sudo -u ec2-user /usr/bin/docker compose up -d --build server","sudo -u ec2-user /usr/bin/docker image prune -f"]}' \
            --query 'Command.CommandId' \
            --output text)
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "SSM Command ID: $CMD_ID"

      - name: Wait for SSM command to complete
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "$EC2_INSTANCE_ID"

      - name: Fetch SSM command output
        if: always()
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
            --output json

      - name: Verify health endpoint
        env:
          HEALTH_URL: ${{ secrets.SERVER_URL }}/health
        run: |
          for i in 1 2 3 4 5 6; do
            code=$(curl -sS -o /tmp/health.json -w '%{http_code}' "$HEALTH_URL" || echo '000')
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed"
          exit 1
