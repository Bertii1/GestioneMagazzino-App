name: Build Mobile App

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-mobile.yml'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options: [android, ios, all]
      bump:
        description: 'Version bump'
        required: false
        default: 'none'
        type: choice
        options: [none, patch, minor, major]

concurrency:
  group: build-mobile
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(node -e "console.log(require('./app.json').expo.version)")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          BUMP_TYPE="${{ inputs.bump }}"
          if [ -z "$BUMP_TYPE" ] || [ "$BUMP_TYPE" = "none" ]; then
            BUMP_TYPE="patch"
          fi

          case "$BUMP_TYPE" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          node -e "
            const fs = require('fs');
            const json = require('./app.json');
            json.expo.version = '$NEW_VERSION';
            const build = parseInt(json.expo.ios?.buildNumber || '0') + 1;
            json.expo.ios = { ...json.expo.ios, buildNumber: String(build) };
            json.expo.android = { ...json.expo.android, versionCode: build };
            fs.writeFileSync('./app.json', JSON.stringify(json, null, 2) + '\n');
          "

          npm version "$NEW_VERSION" --no-git-tag-version --silent
          echo "Bumped: $CURRENT → $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json package.json package-lock.json
          git commit -m "chore(mobile): bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

      - name: Determine platform
        id: platform
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.platform }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=android" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Android APK
        if: steps.platform.outputs.value == 'android' || steps.platform.outputs.value == 'all'
        run: eas build --platform android --profile preview --non-interactive

      - name: Build iOS
        if: steps.platform.outputs.value == 'ios' || steps.platform.outputs.value == 'all'
        run: eas build --platform ios --profile preview --non-interactive

      - name: Notify server of new Android version
        if: (steps.platform.outputs.value == 'android' || steps.platform.outputs.value == 'all') && secrets.BACKUP_API_KEY != ''
        env:
          BACKUP_API_KEY: ${{ secrets.BACKUP_API_KEY }}
        run: |
          BUILD_INFO=$(eas build:list --platform android --status finished --limit 1 --json 2>/dev/null || echo "[]")
          APK_URL=$(echo "$BUILD_INFO" | python3 -c "
import sys, json
builds = json.load(sys.stdin)
if builds:
    print(builds[0].get('artifacts', {}).get('buildUrl', ''))
" 2>/dev/null || echo "")

          VERSION=$(node -e "console.log(require('./app.json').expo.version)")
          BUILD_NUM=$(node -e "console.log(require('./app.json').expo.android?.versionCode ?? 1)")
          API_URL="https://YOUR_SERVER_URL"

          if [ -z "$APK_URL" ]; then
            echo "APK URL not found, skipping version update"
            exit 0
          fi

          curl -sf -X PUT "$API_URL/api/version" \
            -H "Authorization: Bearer $BACKUP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"platform\":\"android\",\"version\":\"$VERSION\",\"buildNumber\":$BUILD_NUM,\"downloadUrl\":\"$APK_URL\",\"minVersion\":\"$VERSION\"}" \
            && echo "Server updated: v$VERSION" \
            || echo "Warning: server version update failed (non-fatal)"

      - name: Print build URLs
        if: always()
        run: |
          echo "Check builds at:"
          echo "https://expo.dev/accounts/3n3rgy07/projects/gestione-magazzino/builds"
