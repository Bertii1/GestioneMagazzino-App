# Override per sviluppo locale — caricato automaticamente da docker compose
# In produzione: docker compose -f docker-compose.yml up (ignora questo file)

services:
  mongo:
    ports:
      - "27017:27017"

  server:
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development

  whisper-asr:
    ports:
      - "9000:9000"
